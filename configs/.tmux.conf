set -g default-terminal "tmux-256color"
set -g display-time 4000
set -g status-interval 5
set -g terminal-overrides ',xterm-256color:Tc'
set -s extended-keys always
set -s extended-keys-format csi-u
set -s terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys'
set -as terminal-features 'screen*:title'
set -as terminal-features 'rxvt*:ignorefkeys'
set -sg escape-time 0

setw -g aggressive-resize on

set-option -g focus-events on

unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded 🚀"

unbind C-b
unbind C-\;
set -g prefix C-\;
bind \; send-prefix

set -g mouse on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -r -T prefix C-Up    resize-pane -U 5
bind-key -r -T prefix C-Down  resize-pane -D 5
bind-key -r -T prefix C-Left  resize-pane -L 5
bind-key -r -T prefix C-Right resize-pane -R 5

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle 
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel 

bind-key -r f run-shell "tmux neww bash ~/codes/repos/dotfiles/tmux-sessionizer"

set -g base-index 1
set -g pane-base-index 1
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#a6e3a1,bg=terminal"
set -g pane-border-style "fg=#45475a"
set -g display-panes-colour "default"
set -g display-panes-active-colour "default"

set -g pane-border-status "off"
set -g pane-border-format "[#[bg=default]#{?pane_active,#[fg=#89b4fa],#[fg=#6c7086]}#{?pane_active,#[bold],} :#P: #T #[fg=default,nobold]]"

set -g status-style bg=terminal
set -g window-status-current-style "fg=#a6e3a1"

set -g status on
set -g status-right-length 180
set -g status-left-length 180

set -g status-left ' #[fg=#89b4fa]#S #[fg=#6c7086]| '
set -g status-interval 1
set -g status-right '#[fg=#89b4fa]#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}") '
set -g mode-style "bg=#89b4fa,fg=#1e1e2e"
